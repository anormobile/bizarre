services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/chat
      - SESSION_SECRET=local-dev-session-secret-at-least-32-chars
      - ENABLE_DEV_ROUTES=${ENABLE_DEV_ROUTES:-true}
      - AFK_IDLE_MS=${AFK_IDLE_MS:-60000}
    volumes:
      - ./files:/app/files
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:18-alpine
    shm_size: '256mb'
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=chat
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
